<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plano de la Feria del Caballo de Jerez 2026
  Replicado en SVG desde el plano oficial del Ayuntamiento.
  Sistema de coordenadas: 1024 x 707 (se mapea a Leaflet CRS.Simple).
  Las casetas NO se dibujan aqu�: las superpone Leaflet como marcadores.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 707" width="1024" height="707" font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Patr�n suelo albero -->
    <pattern id="albero" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#f4e4c1"/>
      <circle cx="6" cy="6" r="0.4" fill="#d4b896" opacity="0.5"/>
      <circle cx="18" cy="14" r="0.4" fill="#d4b896" opacity="0.5"/>
    </pattern>

    <!-- �rbol peque�o reutilizable -->
    <symbol id="tree" viewBox="0 0 12 16">
      <ellipse cx="6" cy="6" rx="5.5" ry="6" fill="#6b8e3c"/>
      <ellipse cx="6" cy="5" rx="4" ry="4" fill="#7ea54a" opacity="0.8"/>
      <rect x="5" y="11" width="2" height="4" fill="#6b4423"/>
    </symbol>

    <!-- Palmera peque�a -->
    <symbol id="palm" viewBox="0 0 10 16">
      <rect x="4.2" y="8" width="1.6" height="7" fill="#8b6f47"/>
      <path d="M5 8 Q1 6 0 3 M5 8 Q9 6 10 3 M5 8 Q3 4 1 2 M5 8 Q7 4 9 2 M5 8 Q5 3 5 1" stroke="#6b8e3c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- Icono puerta con caseta rosa -->
    <symbol id="gate" viewBox="0 0 30 20">
      <rect x="0" y="4" width="30" height="14" fill="#d97a8a" stroke="#a04050" stroke-width="0.8"/>
      <rect x="10" y="8" width="10" height="8" fill="#b35568"/>
      <polygon points="0,4 15,0 30,4" fill="#c66478"/>
    </symbol>

    <!-- Marcador servicio (cruz roja) -->
    <symbol id="serv-health" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="white" stroke="#c93030" stroke-width="1.5"/>
      <rect x="8.5" y="4" width="3" height="12" fill="#c93030"/>
      <rect x="4" y="8.5" width="12" height="3" fill="#c93030"/>
    </symbol>
    <symbol id="serv-police" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="#e8b5b5" stroke="#8b3030" stroke-width="1.5"/>
      <text x="10" y="13.5" font-size="10" font-weight="bold" fill="#8b3030" text-anchor="middle">P</text>
    </symbol>

    <!-- Gradiente suave para IFECA -->
    <linearGradient id="ifecaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4c98d"/>
      <stop offset="100%" stop-color="#e8b56d"/>
    </linearGradient>
  </defs>

  <!-- ===== FONDO ALBERO (todo el recinto) ===== -->
  <rect width="1024" height="707" fill="url(#albero)"/>

