<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plano simplificado de la Feria del Caballo de Jerez.
  Sistema de coordenadas: 1000 x 700 (se mapea a Leaflet CRS.Simple)
  Las "manzanas" son bloques grises donde se colocan las casetas.
  Las calles llevan los nombres reales del recinto Gonzįlez Hontoria.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <pattern id="albero" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#f4e4c1"/>
      <circle cx="10" cy="10" r="0.5" fill="#d4b896" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Fondo: suelo de albero -->
  <rect width="1000" height="700" fill="url(#albero)"/>

  <!-- Borde del recinto -->
  <rect x="20" y="20" width="960" height="660" fill="none" stroke="#8b6f47" stroke-width="3" stroke-dasharray="4 4"/>

  <!-- ====== MANZANAS DE CASETAS (bloques donde van las casetas) ====== -->
  <!-- Fila superior -->
  <rect x="60"  y="80"  width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="280" y="80"  width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="500" y="80"  width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="720" y="80"  width="220" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>

  <!-- Fila 2 -->
  <rect x="60"  y="220" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="280" y="220" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="500" y="220" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="720" y="220" width="220" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>

  <!-- Fila 3 -->
  <rect x="60"  y="360" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="280" y="360" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="500" y="360" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="720" y="360" width="220" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>

  <!-- Fila inferior -->
  <rect x="60"  y="500" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="280" y="500" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="500" y="500" width="180" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>
  <rect x="720" y="500" width="220" height="90" fill="#e8d5b0" stroke="#a88960" stroke-width="1.5" rx="4"/>

  <!-- ====== NOMBRES DE CALLES (horizontales) ====== -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#6b4423" text-anchor="middle">
    <text x="500" y="55">CALLE REAL</text>
    <text x="500" y="200">CALLE PESCADERĶA</text>
    <text x="500" y="340">CALLE AZAHARES</text>
    <text x="500" y="480">CALLE CLAVEL</text>
    <text x="500" y="620">CALLE ROSA</text>
  </g>

  <!-- ====== NOMBRES DE CALLES (verticales / transversales) ====== -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8b6f47" text-anchor="middle" opacity="0.7">
    <text x="260" y="670" transform="rotate(-90 260 670)">C. Nardo</text>
    <text x="480" y="670" transform="rotate(-90 480 670)">C. Jazmķn</text>
    <text x="700" y="670" transform="rotate(-90 700 670)">C. Geranio</text>
  </g>

  <!-- ====== ENTRADAS / PORTADA ====== -->
  <g>
    <rect x="420" y="10" width="160" height="20" fill="#b91c1c" rx="2"/>
    <text x="500" y="25" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PORTADA</text>
  </g>

  <!-- Puntos cardinales -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b6f47" opacity="0.6">
    <text x="30" y="35">N</text>
    <text x="960" y="35">NE</text>
    <text x="30" y="675">SO</text>
    <text x="955" y="675">SE</text>
  </g>
</svg>
